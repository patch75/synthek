name: KB Sync — Génère KB_SYNC.md pour SYNTHEK 2

on:
  push:
    branches: [main]

jobs:
  kb-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Générer KB_SYNC.md
        run: |
          OUTPUT="KB_SYNC.md"
          echo "# KB_SYNC — Synthek" > $OUTPUT
          echo "# Généré automatiquement à chaque push sur main" >> $OUTPUT
          echo "# $(date -u '+%Y-%m-%d %H:%M UTC')" >> $OUTPUT
          echo "" >> $OUTPUT

          append_file() {
            local path=$1
            if [ -f "$path" ]; then
              echo "---" >> $OUTPUT
              echo "## $path" >> $OUTPUT
              echo '```' >> $OUTPUT
              cat "$path" >> $OUTPUT
              echo '```' >> $OUTPUT
              echo "" >> $OUTPUT
            fi
          }

          # Contexte projet
          append_file "CLAUDE.md"

          # Backend — routes clés
          append_file "backend/src/routes/projets.js"
          append_file "backend/src/routes/documents.js"
          append_file "backend/src/routes/alertes.js"
          append_file "backend/prisma/schema.prisma"

          # Services IA
          append_file "backend/src/services/comparerDocuments.js"
          append_file "backend/src/services/ia.js"
          append_file "backend/src/services/extractFaits.js"

          # Parser granulométrie
          append_file "parser-service/extraire_granulometrie.py"
          append_file "parser-service/main.py"

          # Frontend page projet
          append_file "frontend/src/pages/Projet.jsx"

      - name: Commit KB_SYNC.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add KB_SYNC.md
          git diff --cached --quiet || git commit -m "chore: KB sync auto [skip ci]"
          git push
